services:

  rt-n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: rt-n8n
    restart: unless-stopped

    environment:
      TZ: America/Sao_Paulo
      GENERIC_TIMEZONE: America/Sao_Paulo

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: rt-db-n8n
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: public

      QUEUE_MODE: redis
      QUEUE_REDIS_HOST: rt-redis-n8n
      QUEUE_REDIS_PORT: 6379

      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"

      N8N_HOST: n8n.rosnertech.dev.br
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.rosnertech.dev.br

    volumes:
      - rt-vol-n8n-data:/home/node/.n8n
    
    ports:
      - "5678:5678"

    depends_on:
      - rt-db-n8n
      - rt-redis-n8n

    networks:
      - rt-network

  rt-db-n8n:
    image: postgres:15-alpine
    container_name: rt-db-n8n
    restart: unless-stopped

    environment:
      TZ: America/Sao_Paulo
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - rt-vol-n8n-postgres:/var/lib/postgresql/data

    networks:
      - rt-network

  rt-redis-n8n:
    image: redis:7-alpine
    container_name: rt-redis-n8n
    restart: unless-stopped

    command: redis-server --appendonly yes
    
    volumes:
      - rt-vol-n8n-redis:/data

    networks:
      - rt-network



volumes:

  rt-vol-n8n-data:
  rt-vol-n8n-postgres:
  rt-vol-n8n-redis:



networks:
  rt-network:
    external: true